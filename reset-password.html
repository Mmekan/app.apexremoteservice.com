<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Apex Remote Services</title>
  <link href="favicon.ico" rel="icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      margin:0; padding:0; background:#f4f7fa;
      font-family:'Inter',system-ui,sans-serif;
      display:flex; align-items:center; justify-content:center; min-height:100vh;
    }
    .container {
      max-width:420px; width:100%; background:#fff;
      border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.08); overflow:hidden;
    }
    .header {
      background:linear-gradient(135deg,#1363C6,#0f5ab3);
      padding:36px 30px; text-align:center; color:#fff;
    }
    .header h1 { margin:0; font-size:26px; font-weight:700; letter-spacing:-.5px; }
    .header p  { margin:8px 0 0; opacity:.8; font-size:14px; }
    .content { padding:36px 32px; }
    h2 { color:#1f2937; font-size:22px; margin:0 0 6px; text-align:center; }
    .subtitle { color:#64748b; text-align:center; margin-bottom:28px; font-size:15px; }
    label { display:block; margin-bottom:6px; font-weight:500; color:#374151; font-size:14px; }
    .input-wrap { position:relative; margin-bottom:8px; }
    input[type="password"], input[type="text"] {
      width:100%; padding:13px 44px 13px 14px; border:1.5px solid #e5e7eb;
      border-radius:8px; font-size:15px; box-sizing:border-box; transition:border .2s;
    }
    input:focus { outline:none; border-color:#1363C6; box-shadow:0 0 0 3px rgba(19,99,198,.12); }
    .eye-btn {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:#9ca3af; padding:4px;
    }
    .eye-btn:hover { color:#6b7280; }
    .match-msg {
      font-size:12px; margin-bottom:16px; min-height:16px; font-weight:500;
    }
    .match-msg.ok   { color:#22c55e; }
    .match-msg.fail { color:#ef4444; }
    button[type="submit"] {
      width:100%; background:#1363C6; color:#fff; border:none;
      padding:14px; font-size:15px; font-weight:600; border-radius:8px;
      cursor:pointer; transition:all .3s; margin-top:8px;
    }
    button[type="submit"]:hover { background:#0f5ab3; transform:translateY(-1px); }
    button[type="submit"]:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .message { margin-top:16px; text-align:center; font-size:14px; min-height:20px; font-weight:500; }
    .success { color:#10b981; }
    .error   { color:#ef4444; }
    footer { margin-top:24px; text-align:center; font-size:12px; color:#9ca3af; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Apex<span style="color:#15ACE1;">.</span>rs</h1>
      <p>Apex Remote Services</p>
    </div>
    <div class="content">
      <h2>Set New Password</h2>
      <p class="subtitle">Enter your new password below. Make it strong and secure.</p>

      <form id="resetForm" onsubmit="updatePassword(event)">
        <label for="password">New Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••"
            autocomplete="new-password" minlength="6" required
            oninput="checkMatch()"/>
          <button type="button" class="eye-btn" onclick="toggleVis('password','eye1')">
            <svg id="eye1" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                       9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>

        <label for="confirm">Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="••••••••"
            autocomplete="new-password" required
            oninput="checkMatch()"/>
          <button type="button" class="eye-btn" onclick="toggleVis('confirm','eye2')">
            <svg id="eye2" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                       9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>

        <div class="match-msg" id="matchMsg"></div>

        <button type="submit" id="submitBtn">Update Password</button>
      </form>

      <div class="message" id="message"></div>
      <footer>&copy; 2026 Apex Remote Services. All rights reserved.</footer>
    </div>
  </div>

  <script>
    const { createClient } = window.supabase;
    const supabase = createClient(
      'https://glwncvlpnchxcsngsuhe.supabase.co',
      'sb_publishable_D84XYOx5qE_iGSbKk0WE5g_KJf-qb1J'
    );

    // ── Detect recovery session from URL ──
    // Supabase puts the token in the URL hash on redirect
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('message').textContent = '';
        console.log('Recovery session active');
      }
    });

    // ── Password visibility toggle ──
    function toggleVis(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
             a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
             M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
             m7.532 7.532l3.29 3.29M3 3l3.59 3.59
             m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7
             a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
        : `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
           <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                    9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    }

    // ── Live match check ──
    function checkMatch() {
      const p1  = document.getElementById('password').value;
      const p2  = document.getElementById('confirm').value;
      const msg = document.getElementById('matchMsg');
      if (!p2) { msg.textContent = ''; return; }
      if (p1 === p2) {
        msg.textContent = '✓ Passwords match';
        msg.className   = 'match-msg ok';
      } else {
        msg.textContent = '✗ Passwords do not match';
        msg.className   = 'match-msg fail';
      }
    }

    // ── Submit ──
    async function updatePassword(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const messageEl = document.getElementById('message');
      const btn       = document.getElementById('submitBtn');

      messageEl.textContent = '';

      if (password.length < 6) {
        messageEl.textContent = 'Password must be at least 6 characters.';
        messageEl.className   = 'message error';
        return;
      }
      if (password !== confirm) {
        messageEl.textContent = 'Passwords do not match.';
        messageEl.className   = 'message error';
        return;
      }

      btn.textContent = 'Updating…';
      btn.disabled    = true;

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        messageEl.textContent = error.message;
        messageEl.className   = 'message error';
        btn.textContent       = 'Update Password';
        btn.disabled          = false;
      } else {
        messageEl.textContent = '✅ Password updated! Redirecting to login…';
        messageEl.className   = 'message success';
        setTimeout(() => window.location.replace('login.html'), 2500);
      }
    }
  </script>
</body>
</html>
