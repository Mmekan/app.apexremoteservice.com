<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #f4f7fa;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1363C6, #0f5ab3);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }

    .logo {
      color: white;  
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .content {
      padding: 40px 35px;
    }

    h1 {
      color: #1f2937;
      font-size: 26px;
      margin: 0 0 8px 0;
      text-align: center;
    }

    p {
      color: #64748b;
      text-align: center;
      margin-bottom: 30px;
      font-size: 15.5px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #374151;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      box-sizing: border-box;
      transition: border 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #1363C6;
      box-shadow: 0 0 0 3px rgba(19, 99, 198, 0.15);
    }

    button {
      width: 100%;
      background-color: #1363C6;
      color: white;
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #0f5ab3;
      transform: translateY(-1px);
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .success { color: #10b981; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Content -->
    <div class="content">
      <h1>Set New Password</h1>
      <p>Enter your new password below. Make sure it's strong and secure.</p>

      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">

      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">

      <button onclick="updatePassword()">Update Password</button>

      <div id="message" class="message">
        <footer style="margin-top: 20px; text-align: center; font-size: 12px; color: #9ca3af;">
            &copy; 2026 Apex Remote Services. All rights reserved.
        </footer>
      </div>
    </div>
    
  </div>

  <script>
    const { createClient } = window.supabase;
    const supabase = createClient(
      'https://glwncvlpnchxcsngsuhe.supabase.co',
      'sb_publishable_D84XYOx5qE_iGSbKk0WE5g_KJf-qb1J'
    );

    async function updatePassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const messageEl = document.getElementById('message');

      messageEl.textContent = '';

      if (password.length < 6) {
        messageEl.textContent = 'Password must be at least 6 characters long';
        messageEl.className = 'message error';
        return;
      }

      if (password !== confirmPassword) {
        messageEl.textContent = 'Passwords do not match';
        messageEl.className = 'message error';
        return;
      }

      // Show loading state
      const btn = document.querySelector('button');
      const originalText = btn.textContent;
      btn.textContent = 'Updating...';
      btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        messageEl.textContent = error.message;
        messageEl.className = 'message error';
      } else {
        messageEl.textContent = '✅ Password updated successfully!';
        messageEl.className = 'message success';
        
        setTimeout(() => {
          window.location.href = 'login.html'; // Change to your login page URL
        }, 2000);
      }

      btn.textContent = originalText;
      btn.disabled = false;
    }

    // Allow pressing Enter to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        updatePassword();
      }
    });
  </script>
</body>
</html>
