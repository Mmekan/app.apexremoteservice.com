<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Remote Services - Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }

    .input-focus {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(21, 172, 225, 0.15);
      border-color: #15ACE1;
      transform: translateY(-1px);
    }

    .tab-active {
      color: #14183E;
      border-bottom: 3px solid #15ACE1;
      font-weight: 600;
    }

    .header-gradient {
      background: linear-gradient(135deg, #14183E 0%, #1E2A5E 100%);
    }

    .btn-primary {
      background: #0f5ab3;
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(21, 172, 225, 0.4);
    }
  </style>
</head>

<body class="min-h-screen bg-[#F4F7FE] flex items-center justify-center py-8">

  <div 
    class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden"
    x-data="authForm()"
  >
    <!-- Header -->
    <div class="header-gradient px-8 py-10 text-white text-center relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/3 blur-3xl"></div>
      
      <h1 class="text-4xl font-bold tracking-tighter">
        Apex<span class="text-[#15ACE1]">.</span>rs
      </h1>
      <p class="mt-3 text-blue-200 text-lg font-medium">
        Train AI. Get paid. Repeat.
      </p>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-100">
      <button
        type="button"
        @click="mode = 'login'"
        :class="{ 'tab-active': mode === 'login' }"
        class="flex-1 py-5 text-center text-gray-600 hover:text-gray-900 transition-colors text-lg"
      >
        Sign In
      </button>

      <button
        type="button"
        @click="mode = 'signup'"
        :class="{ 'tab-active': mode === 'signup' }"
        class="flex-1 py-5 text-center text-gray-600 hover:text-gray-900 transition-colors text-lg"
      >
        Sign Up
      </button>
    </div>

    <!-- Form -->
    <div class="p-8">
      <form @submit.prevent="handleSubmit" class="space-y-6">

        <!-- Signup Fields -->
        <div x-show="mode === 'signup'" class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
            <input
              type="text"
              x-model="firstName"
              required
              class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl focus:outline-none text-base"
              placeholder="Alex"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
            <input
              type="text"
              x-model="lastName"
              required
              class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl focus:outline-none text-base"
              placeholder="Rivera"
            />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input
            type="email"
            x-model="email"
            required
            class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl focus:outline-none text-base"
            placeholder="you@example.com"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input
            type="password"
            x-model="password"
            required
            minlength="6"
            class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl focus:outline-none text-base"
            placeholder="••••••••"
          />
        </div>

        <!-- Forgot Password -->
        <div x-show="mode === 'login'" class="text-right">
          <a href="#" @click.prevent="forgotPassword" class="text-sm text-[#15ACE1] hover:underline font-medium">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          :disabled="loading"
          class="btn-primary w-full font-semibold py-4 rounded-2xl text-lg text-white shadow-md flex justify-center items-center gap-2"
        >
          <span x-show="!loading" x-text="mode === 'login' ? 'Sign In' : 'Create Account'"></span>
          <span x-show="loading" class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Processing...
          </span>
        </button>

      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-gray-500">
          Need help? 
          <a href="#" @click.prevent="contactSupport" class="text-[#15ACE1] hover:underline font-medium">Contact Support</a>
        </p>
      </div>
    </div>

    <div class="px-8 py-6 bg-gray-50 border-t text-center text-xs text-gray-400">
      Secure login powered by Apex.rs
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
  <script>
  // Clear any stale auth state when login page loads
  // This ensures switching accounts always works cleanly
  window.addEventListener('load', async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    // If session exists but user navigated back to login manually, sign them out
    if (session && window.location.pathname.includes('login')) {
      // Don't sign out — just let the redirect check above handle it
      // But do clear localStorage of any broken partial tokens
      const keys = Object.keys(localStorage).filter(k => k.startsWith('sb-'));
      // Only clear if session is NOT confirmed (broken/partial session)
      if (!session.user?.email_confirmed_at) {
        keys.forEach(k => localStorage.removeItem(k));
        console.log('Cleared stale session');
      }
    }
  });
</script>

</body>
</html>
