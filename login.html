<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Remote Services - Login</title>
  <link rel="icon" type="image/png" href="img/apexlogo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .input-focus { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(21,172,225,0.15);
      border-color: #15ACE1;
      outline: none;
    }
    .tab-active { color: #14183E; border-bottom: 3px solid #15ACE1; font-weight: 600; }
    .header-gradient { background: linear-gradient(135deg,#14183E 0%,#1E2A5E 100%); }
    .btn-primary { background:#0f5ab3; transition:all 0.3s cubic-bezier(0.4,0.0,0.2,1); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 20px -5px rgba(21,172,225,0.4); }
    .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }
  </style>
</head>
<body class="min-h-screen bg-[#F4F7FE] flex items-center justify-center py-8">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- Header -->
    <div class="header-gradient px-8 py-10 text-white text-center relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/3 blur-3xl"></div>
      <h1 class="text-4xl font-bold tracking-tighter">
        Apex<span class="text-[#15ACE1]">.</span>rs
      </h1>
      <p class="mt-3 text-blue-200 text-lg font-medium">Train AI. Get paid. Repeat.</p>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-100">
      <button type="button" id="tabLogin"
        class="flex-1 py-5 text-center text-gray-600 hover:text-gray-900 transition-colors text-lg tab-active"
        onclick="switchTab('login')">Sign In</button>
      <button type="button" id="tabSignup"
        class="flex-1 py-5 text-center text-gray-600 hover:text-gray-900 transition-colors text-lg"
        onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Form -->
    <div class="p-8">
      <form id="authForm" class="space-y-6" onsubmit="handleSubmit(event)">

        <!-- Signup fields -->
        <div id="signupFields" class="grid grid-cols-2 gap-4" style="display:none;">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
            <input type="text" id="firstName"
              class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl text-base"
              placeholder="Alex"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
            <input type="text" id="lastName"
              class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl text-base"
              placeholder="Rivera"/>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input type="email" id="email" required
            class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl text-base"
            placeholder="you@example.com"/>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <div class="relative">
            <input type="password" id="password" required minlength="6"
              class="input-focus w-full px-6 py-4 border border-gray-200 rounded-2xl text-base pr-14"
              placeholder="••••••••"/>
            <button type="button" onclick="togglePassword()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 p-1"
              tabindex="-1">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                     9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <div id="forgotRow" class="text-right">
          <a href="#" onclick="forgotPassword(); return false;"
            class="text-sm text-[#15ACE1] hover:underline font-medium">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn"
          class="btn-primary w-full font-semibold py-4 rounded-2xl text-lg text-white shadow-md
                 flex justify-center items-center gap-2">
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" style="display:none;" class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10"
                stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Processing...
          </span>
        </button>

      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-gray-500">
          Need help?
          <a href="mailto:contact@apexremoteservices.com"
            class="text-[#15ACE1] hover:underline font-medium">Contact Support</a>
        </p>
      </div>
    </div>

    <div class="px-8 py-6 bg-gray-50 border-t text-center text-xs text-gray-400">
      Secure login powered by Apex.rs
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>

</body>
</html>
