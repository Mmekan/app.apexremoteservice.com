<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Remote Services | Coming Soon</title>

  <!-- Meta -->

  <meta name="description" content="Apex Remote Services is launching soon. Reliable remote support, digital solutions, and professional services." />
  <meta name="theme-color" content="#0f3d2e" />

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --green-dark: #14183E;
      --green: #1363C6;
      --neon: #15ACE1;
      --text-light: #e9f5ef;
      --text-muted: #b7c5d8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1363C6, #14183E);
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 760px;
      width: 100%;
      text-align: center;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 48px 32px;
      border: 1px solid rgba(50, 84, 255, 0.2);
      box-shadow: 0 0 40px rgba(50, 122, 255, 0.08);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--neon);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 16px;
    }

    p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      background: rgba(50, 142, 255, 0.12);
      color: var(--neon);
      margin-bottom: 20px;
    }

    .notify {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notify input {
      flex: 1 1 240px;
      max-width: 320px;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 0.95rem;
    }

    .notify button {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, var(--neon), #15ACE1);
      color: #F4F7FE;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .notify button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(50, 139, 255, 0.35);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .feature {
      background: rgba(15, 30, 61, 0.6);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid rgba(50, 122, 255, 0.15);
    }

    .feature h3 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: var(--neon);
    }

    .feature span {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #8fa3bf;
    }

    @media (max-width: 480px) {
      .container {
        padding: 36px 22px;
      }
    }
  </style>

</head>
<body>
  <main class="container">
    <div class="badge">Launching Soon</div>
    <div class="logo">Apex Remote Services</div>
